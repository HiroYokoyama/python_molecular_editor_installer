name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without a leading v, for example 1.2.3"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set APP_VERSION
        id: set_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "APP_VERSION=${{ inputs.version }}" >> $GITHUB_ENV
          else
            VERSION="${GITHUB_REF_NAME#v}"
            echo "APP_VERSION=$VERSION" >> $GITHUB_ENV
          fi

      - name: Validate Release Version
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ github.ref_name }}" != "main" ]; then
            echo "Releases must be run from the main branch."
            exit 1
          fi

          VERSION="${{ inputs.version }}"
          if [[ ! "$VERSION" =~ ^[0-9]+(\.[0-9]+){2}([a-zA-Z0-9.-]+)?$ ]]; then
            echo "Invalid version: $VERSION. Use a version without a leading v, for example 1.2.3"
            exit 1
          fi

          if git tag -l | grep -q "^${VERSION}$"; then
            echo "Tag already exists: $VERSION"
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build pytest pytest-mock pytest-cov
          python -m pip install pyshortcuts

      - name: Run Tests
        run: |
          python -m pytest tests/ -v

      - name: Update Package Version
        if: github.event_name == 'workflow_dispatch'
        shell: python
        run: |
          import os
          import re
          from pathlib import Path

          version = os.environ["APP_VERSION"]
          path = Path("moleditpy-installer/pyproject.toml")
          text = path.read_text(encoding="utf-8")
          text, count = re.subn(
              r'(?m)^version\s*=\s*["\'][^"\']+["\']',
              f'version = "{version}"',
              text,
              count=1,
          )
          if count != 1:
              raise SystemExit("Could not update moleditpy-installer/pyproject.toml")
          path.write_text(text, encoding="utf-8")

      - name: Build Package
        working-directory: moleditpy-installer
        run: |
          python -m build --outdir ../dist

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: dist/*

      - name: Commit and Push Release Tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add moleditpy-installer/pyproject.toml
          git diff --staged --quiet || git commit -m "Bump version to ${APP_VERSION}"
          git tag "v${APP_VERSION}"
          git push origin HEAD:${{ github.ref_name }}
          git push origin "v${APP_VERSION}"

  publish-and-create-release:
    runs-on: ubuntu-latest
    needs: build-and-release
    permissions:
      id-token: write
      contents: write

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: dist

      - name: Publish Package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

      - name: Set APP_VERSION
        id: set_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "APP_VERSION=${{ inputs.version }}" >> $GITHUB_ENV
          else
            VERSION="${GITHUB_REF_NAME#v}"
            echo "APP_VERSION=$VERSION" >> $GITHUB_ENV
          fi

      - name: Detect Pre-release
        id: prerelease_check
        run: |
          if echo "$APP_VERSION" | grep -qE '[a-zA-Z]'; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.APP_VERSION }}
          prerelease: ${{ steps.prerelease_check.outputs.is_prerelease == 'true' }}
          files: |
            dist/*
          generate_release_notes: true
