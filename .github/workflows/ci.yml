name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }} / Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.9", "3.11", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test dependencies
        run: |
          pip install pyshortcuts textual pytest pytest-mock pytest-cov
          pip install -e "moleditpy-installer/" --no-deps

      - name: Run tests
        run: python -m pytest tests/ -v

  smoke-macos:
    name: Smoke test (macOS end-to-end)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install installer (without moleditpy)
        run: |
          pip install pyshortcuts
          pip install -e "moleditpy-installer/" --no-deps

      - name: Create dummy moleditpy executable
        run: |
          BIN_DIR="$(dirname "$(which python)")"
          cat > "$BIN_DIR/moleditpy" << 'EOF'
          #!/usr/bin/env python3
          import sys
          if "--version" in sys.argv:
              print("MoleditPy 0.0.0-smoke")
              sys.exit(0)
          print("smoke launch:", sys.argv[1:])
          EOF
          chmod +x "$BIN_DIR/moleditpy"
          moleditpy --version

      - name: Run installer
        run: moleditpy-installer --desktop

      - name: Verify app bundle
        run: |
          set -x
          APP="$HOME/Applications/MoleditPy.app"
          test -d "$APP"
          test -d "$HOME/Desktop/MoleditPy.app"
          # signature must be valid — a broken one fails silently on Apple Silicon
          codesign --verify --deep --strict "$APP"
          # bundle identity + .pmeprj document type (index-independent checks)
          PLIST="$APP/Contents/Info.plist"
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$PLIST")" = "com.moleditpy.launcher"
          plutil -p "$PLIST" | grep -q '"pmeprj"'
          plutil -p "$PLIST" | grep -q 'com.moleditpy.pmeprj'
          # the launcher must claim ONLY .pmeprj (osacompile's default
          # document type must be replaced, not appended to)
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleDocumentTypes:0:CFBundleTypeExtensions:0' "$PLIST")" = "pmeprj"
          if /usr/libexec/PlistBuddy -c 'Print :CFBundleDocumentTypes:1' "$PLIST" 2>/dev/null; then
            echo "unexpected extra document type" && exit 1
          fi
          # icons in place, asset-catalog override stripped
          test -f "$APP/Contents/Resources/applet.icns"
          test -f "$APP/Contents/Resources/file_icon.icns"
          test ! -f "$APP/Contents/Resources/Assets.car"
          if /usr/libexec/PlistBuddy -c 'Print :CFBundleIconName' "$PLIST" 2>/dev/null; then
            echo "CFBundleIconName must be removed" && exit 1
          fi

      - name: Verify --check and --remove
        run: |
          moleditpy-installer --check
          moleditpy-installer --uninstall
          test ! -d "$HOME/Applications/MoleditPy.app"
          test ! -d "$HOME/Desktop/MoleditPy.app"

  smoke-windows:
    name: Smoke test (Windows end-to-end)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install installer (without moleditpy)
        shell: bash
        run: |
          pip install pyshortcuts
          pip install -e "moleditpy-installer/" --no-deps

      - name: Create dummy moleditpy executable
        shell: bash
        run: |
          SCRIPTS_DIR="$(dirname "$(which python)")/Scripts"
          mkdir -p "$SCRIPTS_DIR"
          # never executed by the installer on Windows — only located
          printf 'MZ dummy' > "$SCRIPTS_DIR/moleditpy.exe"

      - name: Run installer
        shell: bash
        run: moleditpy-installer --desktop

      - name: Verify shortcuts and registry
        shell: bash
        run: |
          test -f "$(cygpath "$APPDATA")/Microsoft/Windows/Start Menu/Programs/MoleditPy.lnk"
          test -f "$(cygpath "$USERPROFILE")/Desktop/MoleditPy.lnk"
          reg query 'HKCU\Software\Classes\.pmeprj' //ve | grep -i 'MoleditPy.File'
          reg query 'HKCU\Software\Classes\MoleditPy.File\shell\open' //ve | grep -i 'Open with MoleditPy'
          reg query 'HKCU\Software\Classes\MoleditPy.File\shell\open\command' //ve | grep -i 'moleditpy.exe'
          reg query 'HKCU\Software\Classes\MoleditPy.File\DefaultIcon' //ve | grep -i 'file_icon.ico'
          # the icon must live in the persistent dir, not %TEMP%
          test -f "$(cygpath "$LOCALAPPDATA")/MoleditPy/installer/file_icon.ico"

      - name: Verify --check and --uninstall
        shell: bash
        run: |
          moleditpy-installer --check
          moleditpy-installer --uninstall
          test ! -f "$(cygpath "$APPDATA")/Microsoft/Windows/Start Menu/Programs/MoleditPy.lnk"
          test ! -f "$(cygpath "$USERPROFILE")/Desktop/MoleditPy.lnk"
          if reg query 'HKCU\Software\Classes\.pmeprj' //ve 2> /dev/null; then
            echo ".pmeprj association must be removed" && exit 1
          fi

      - name: Verify system-wide install and uninstall (admin)
        shell: bash
        run: |
          set -x
          moleditpy-installer --system
          reg query 'HKLM\Software\Classes\.pmeprj' //ve | grep -i 'MoleditPy.File'
          PROGRAMDATA_DIR="${PROGRAMDATA:-${ProgramData:-C:/ProgramData}}"
          test -f "$(cygpath "$PROGRAMDATA_DIR")/Microsoft/Windows/Start Menu/Programs/MoleditPy.lnk"
          test -f "$(cygpath "$PROGRAMDATA_DIR")/MoleditPy/installer/file_icon.ico"
          moleditpy-installer --uninstall --system
          test ! -f "$(cygpath "$PROGRAMDATA_DIR")/Microsoft/Windows/Start Menu/Programs/MoleditPy.lnk"
          if reg query 'HKLM\Software\Classes\.pmeprj' //ve 2> /dev/null; then
            echo "HKLM .pmeprj association must be removed" && exit 1
          fi

  smoke-linux:
    name: Smoke test (Linux end-to-end)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install installer (without moleditpy)
        run: |
          pip install pyshortcuts
          pip install -e "moleditpy-installer/" --no-deps

      - name: Create dummy moleditpy executable
        run: |
          BIN_DIR="$(dirname "$(which python)")"
          cat > "$BIN_DIR/moleditpy" << 'EOF'
          #!/usr/bin/env python3
          import sys
          if "--version" in sys.argv:
              print("MoleditPy 0.0.0-smoke")
              sys.exit(0)
          print("smoke launch:", sys.argv[1:])
          EOF
          chmod +x "$BIN_DIR/moleditpy"
          mkdir -p "$HOME/Desktop"
          moleditpy --version

      - name: Run installer
        run: moleditpy-installer --desktop

      - name: Install desktop tooling
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends shared-mime-info libglib2.0-bin

      - name: Verify desktop entry and MIME registration
        run: |
          set -x
          DESKTOP="$HOME/.local/share/applications/MoleditPy.desktop"
          test -f "$DESKTOP"
          grep -x 'Terminal=true' "$DESKTOP"
          grep -x 'MimeType=application/x-moleditpy-project;' "$DESKTOP"
          test -f "$HOME/.local/share/mime/packages/moleditpy.xml"
          grep -q 'pattern="\*.pmeprj"' "$HOME/.local/share/mime/packages/moleditpy.xml"
          grep -q '<icon name="application-x-moleditpy-project"/>' "$HOME/.local/share/mime/packages/moleditpy.xml"
          for size in 16 22 24 32 48 64 128 256; do
            test -f "$HOME/.local/share/icons/hicolor/${size}x${size}/mimetypes/application-x-moleditpy-project.png"
          done
          # the compiled per-user MIME database must contain our glob
          # (xdg-mime query is unreliable on a bare runner — it falls back
          # to file(1) magic, which ignores per-user glob databases)
          update-mime-database "$HOME/.local/share/mime"
          grep 'application/x-moleditpy-project:\*\.pmeprj' "$HOME/.local/share/mime/globs2"
          # gio consults the shared-mime db (including the user dir);
          # the file must be non-empty — zero-byte files resolve to
          # application/x-zerosize, which beats glob matching
          echo '{}' > /tmp/sample.pmeprj
          gio info -a standard::content-type /tmp/sample.pmeprj | grep application/x-moleditpy-project

      - name: Verify --remove
        run: |
          moleditpy-installer --uninstall
          test ! -f "$HOME/.local/share/applications/MoleditPy.desktop"
          test ! -f "$HOME/.local/share/mime/packages/moleditpy.xml"
          for size in 16 22 24 32 48 64 128 256; do
            test ! -f "$HOME/.local/share/icons/hicolor/${size}x${size}/mimetypes/application-x-moleditpy-project.png"
          done

      - name: Verify system-wide install and remove (sudo)
        run: |
          set -x
          sudo "$(which moleditpy-installer)" --system
          test -f /usr/share/applications/MoleditPy.desktop
          grep -x 'MimeType=application/x-moleditpy-project;' /usr/share/applications/MoleditPy.desktop
          grep -x 'Terminal=true' /usr/share/applications/MoleditPy.desktop
          test -f /usr/share/mime/packages/moleditpy.xml
          for size in 16 22 24 32 48 64 128 256; do
            test -f "/usr/share/icons/hicolor/${size}x${size}/mimetypes/application-x-moleditpy-project.png"
          done
          # without root, --system must fail with a clear error
          if moleditpy-installer --system --no-tui; then
            echo "--system without root must fail" && exit 1
          fi
          sudo "$(which moleditpy-installer)" --uninstall --system
          test ! -f /usr/share/applications/MoleditPy.desktop
          test ! -f /usr/share/mime/packages/moleditpy.xml
          for size in 16 22 24 32 48 64 128 256; do
            test ! -f "/usr/share/icons/hicolor/${size}x${size}/mimetypes/application-x-moleditpy-project.png"
          done

